        const WordRain = () => {
            const [gameState, setGameState] = React.useState('ready');

            const [fallingWords, setFallingWords] = React.useState([]);
            const [inputValue, setInputValue] = React.useState("");
            const startGame = () => { setGameState('playing'); setScore(0); setFallingWords([]); setInputValue(""); };
            React.useEffect(() => {
                if (gameState !== 'playing') return;
                const spawn = setInterval(() => { setFallingWords(prev => [...prev, { id: Date.now(), text: gameWords[Math.floor(Math.random() * gameWords.length)], x: Math.random() * 70 + 5, y: -10, speed: Math.random() * 0.4 + 0.3 }]); }, 2000);
                const move = setInterval(() => { setFallingWords(prev => { const moved = prev.map(w => ({ ...w, y: w.y + w.speed })); if (moved.some(w => w.y > 85)) { setGameState('gameover'); return []; } return moved; }); }, 50);
                return () => { clearInterval(spawn); clearInterval(move); };
            }, [gameState]);
            const checkMatch = (e) => { const val = e.target.value; setInputValue(val); const target = fallingWords.find(w => w.text === val); if (target) { setFallingWords(prev => prev.filter(w => w.id !== target.id)); setScore(s => s + 10); setInputValue(""); } };
            return (
                <div className="w-full h-full bg-white relative overflow-hidden flex flex-col items-center justify-center">

                            <div className="absolute bottom-4 w-full px-4"><input type="text" autoFocus value={inputValue} onChange={checkMatch} className="w-full border-4 border-black p-3 text-xl font-black text-center text-black bg-yellow-100 outline-none" placeholder="타이핑!" /></div>

        const WordSnake = () => {
            const [gameState, setGameState] = React.useState('ready');
            const [snake, setSnake] = React.useState([{x: 5, y: 5}]);
            const [food, setFood] = React.useState({x: 10, y: 10, text: "한국어"});
            const [dir, setDir] = React.useState({x: 1, y: 0});
            const [score, setScore] = React.useState(0);
            const startGame = () => { setGameState('playing'); setSnake([{x: 5, y: 5}]); setScore(0); setDir({x: 1, y: 0}); spawnFood(); };
            const spawnFood = () => setFood({ x: Math.floor(Math.random()*18), y: Math.floor(Math.random()*15), text: gameWords[Math.floor(Math.random()*gameWords.length)] });
            React.useEffect(() => {

                const move = setInterval(() => {

                                        <p className="font-black text-2xl uppercase mt-4">중급 문법</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'grammar' && bookLevel === '2B' && !selectedGrammar && (
                            <div className="animate-fade text-center px-1">
                                <button onClick={() => setBookLevel(null)} className="mb-4 font-black text-xs md:text-xl italic flex items-center text-white">← BACK TO BOOKS</button>
                                <h2 className="text-4xl md:text-8xl font-title italic mb-10 uppercase">2B Grammar</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8 text-black mb-20">
                                    {Object.keys(grammarData).map(key => (<div key={key} onClick={() => setSelectedGrammar(key)} className="border-4 border-black p-6 md:p-10 bg-white brutal-shadow hover:bg-black hover:text-white transition-all cursor-pointer"><h3 className="text-xl md:text-4xl font-title mb-1 leading-tight">{key}</h3><p className="font-black text-[8px] md:text-sm opacity-40 uppercase font-black">Study Now</p></div>))}
                                </div>
                            </div>
                        )}

                        {view === 'grammar' && selectedGrammar && (
                            <div className="animate-fade pb-20 px-1 text-black">
                                <button onClick={() => setSelectedGrammar(null)} className="mb-4 font-black text-[10px] md:text-xl italic flex items-center text-white">← BACK TO LIST</button>
                                <div className="bg-white border-4 md:border-8 border-black p-4 md:p-12 brutal-shadow mb-6 text-left">
                                    <h2 className="text-2xl md:text-7xl font-title mb-4 leading-tight break-keep">{grammarData[selectedGrammar].title}</h2>
                                    <div className="mb-8"><p className="text-lg md:text-3xl font-black text-red-600 mb-2 uppercase italic leading-none">● Meaning</p><div className="bg-gray-100 p-4 md:p-8 border-l-[8px] md:border-l-[16px] border-black text-left"><p className="text-sm md:text-3xl font-black mb-1 leading-tight font-black">{grammarData[selectedGrammar].usage.meaning}</p><p className="text-[10px] md:text-xl font-bold opacity-60 leading-relaxed font-bold">{grammarData[selectedGrammar].usage.description}</p></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2 md:gap-8 mb-8">{grammarData[selectedGrammar].rules.map((r, i) => (<div key={i} className="border-2 md:border-4 border-black p-3 md:p-6 bg-white"><p className="font-title text-[10px] md:text-2xl mb-1 bg-black text-white px-2 py-0.5 inline-block">{r.case}</p><p className="font-black text-[10px] md:text-xl mb-1 leading-tight font-black">{r.rule}</p><p className="font-bold text-blue-600 text-[9px] md:text-lg italic border-t border-dashed pt-1 font-bold">{r.example}</p></div>))}</div>
                                    <div className={`${grammarData[selectedGrammar].irregulars.isSafe ? 'bg-yellow-300' : 'bg-red-500'} border-4 md:border-8 border-black p-4 md:p-10 brutal-shadow`}>
                                        <h3 className={`font-title text-lg md:text-5xl uppercase italic mb-4 ${!grammarData[selectedGrammar].irregulars.isSafe && 'text-white'}`}>{grammarData[selectedGrammar].irregulars.isSafe ? '🛡️ SAFE ZONE' : '⚠️ DANGER ZONE'}</h3>
                                        <div className="bg-white border-2 md:border-4 border-black p-3 md:p-8 mb-4 text-black text-left font-black leading-tight"><p className="text-sm md:text-xl font-bold leading-relaxed font-bold">{grammarData[selectedGrammar].irregulars.reason}</p></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">{grammarData[selectedGrammar].irregulars.examples.map((ex, i) => (<div key={i} className="bg-white p-3 md:p-6 border-2 md:border-4 border-black text-left"><p className="font-black text-red-600 text-[8px] md:text-sm mb-1 uppercase font-black">{ex.type}</p><p className="font-title text-xl md:text-5xl mb-1 font-medium">{ex.word}</p><p className="font-black text-md md:text-2xl text-blue-600 font-black">✅ {ex.result}</p><p className="font-black text-[9px] md:text-lg text-gray-400 line-through mt-0.5 font-black">❌ {ex.note}</p></div>))}</div>
                                    </div>
                                </div>
                                <div className="bg-white border-4 md:border-8 border-black p-4 md:p-8 brutal-shadow mb-8 text-black text-left"><h3 className="text-lg md:text-4xl font-title mb-4 italic underline uppercase">Vocab Bank</h3><div className="grid grid-cols-2 md:grid-cols-5 gap-2">{grammarData[selectedGrammar].keywords.map((w, i) => (<div key={i} className="border border-black p-2 font-black text-center font-black"><p className="text-[11px] md:text-xl leading-tight">{w.ko}</p><p className="text-[8px] md:text-xs opacity-50 uppercase">{w.en}</p></div>))}</div></div>
                                <div className="bg-black text-white border-4 md:border-8 border-black p-4 md:p-10 brutal-shadow text-left"><h3 className="text-lg md:text-4xl font-title mb-8 text-yellow-400 italic uppercase underline decoration-yellow-400 decoration-4">Practice</h3><div className="space-y-8">{grammarData[selectedGrammar].practiceItems.map((item, i) => (<div key={i} className="border-b border-gray-700 pb-6"><p className="text-[13px] md:text-2xl font-black mb-2 text-yellow-400 leading-tight font-black"><span className="font-title mr-2">{i+1}.</span> {item.question}</p><div className="flex flex-col md:flex-row gap-2"><input type="text" className="bg-gray-900 border border-white p-2 text-xs md:text-xl font-black text-yellow-400 outline-none flex-1 font-black" placeholder="Type answer..." /><button className="bg-white text-black px-4 py-2 font-black text-[10px] md:text-lg uppercase font-black">Check</button></div></div>))}</div></div>
                            </div>
                        )}

                        {view === 'diary' && (
                            <div className="animate-fade text-center px-2">
                                <h2 className="text-4xl md:text-8xl font-title italic mb-8 text-white uppercase">Diary Board 일기장</h2>
                                <div className="border-8 border-black p-6 bg-white brutal-shadow text-black mb-10 text-left">
                                    <textarea value={diaryInput} onChange={(e) => setDiaryInput(e.target.value)} className="w-full h-40 border-4 border-black p-4 text-lg font-black mb-4 focus:bg-yellow-50 outline-none" placeholder="오늘 배운 문법을 써보세요!"></textarea>
                                    <button onClick={saveDiary} className="bg-black text-white px-10 py-4 font-black text-xl brutal-shadow-sm uppercase">일기 저장 SAVE</button>
                                </div>
                                <div className="space-y-8"> {diaries.map((d) => ( <div key={d.id} className="bg-yellow-100 border-4 border-black p-6 brutal-shadow text-black text-left"><p className="text-xs font-bold opacity-40 mb-2 font-bold">{d.date}</p><p className="text-xl font-black break-words mb-4 font-black">{d.text}</p>{d.reply && (<div className="bg-white border-l-8 border-black p-4 mt-4 italic font-bold font-black"><p className="text-xs uppercase opacity-60 mb-1 font-black">Chris's Feedback:</p><p className="text-lg">"{d.reply}"</p></div>)}<div className="mt-6 pt-4 border-t-2 border-black/10"><input value={diaryReplyInput[d.id] || ""} onChange={(e) => setDiaryReplyInput({...diaryReplyInput, [d.id]: e.target.value})} className="w-full border-2 border-black p-2 text-sm font-black mb-2" placeholder="피드백 남기기..." /><button onClick={() => addDiaryReply(d.id)} className="bg-black text-white px-4 py-1 text-xs font-black uppercase">답변 달기</button></div></div> ))} </div>
                            </div>
                        )}

                        {view === 'community' && (
                            <div className="animate-fade text-center px-2">
                                <h2 className="text-4xl md:text-8xl font-title italic mb-10 text-white uppercase font-black">Ask Chris 질문</h2>
                                <div className="bg-white border-8 border-black p-6 brutal-shadow text-black mb-10 text-left">
                                    <textarea value={questionInput} onChange={(e) => setQuestionInput(e.target.value)} className="w-full h-32 border-4 border-black p-4 text-lg font-black mb-4 focus:bg-blue-50 outline-none" placeholder="Chris에게 궁금한 걸 물어보세요!"></textarea>
                                    <button onClick={saveQuestion} className="bg-black text-white px-10 py-4 font-black text-xl brutal-shadow-sm uppercase font-black">질문 전송 SEND</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6"> {questions.map((q) => ( <div key={q.id} className="bg-white border-4 border-black p-6 brutal-shadow text-black text-left"><p className="text-xs font-bold opacity-30 mb-2 font-bold">{q.date}</p><p className="text-lg font-black break-words mb-4 font-black">{q.text}</p>{q.reply && (<div className="bg-blue-100 border-l-8 border-blue-600 p-4 mt-4 font-bold font-black"><p className="text-[10px] uppercase text-blue-600 mb-1 font-black">Chris's Answer:</p><p className="text-md font-bold">"{q.reply}"</p></div>)}<div className="mt-6 pt-4 border-t-2 border-black/10"><input value={questionReplyInput[q.id] || ""} onChange={(e) => setQuestionReplyInput({...questionReplyInput, [q.id]: e.target.value})} className="w-full border-2 border-black p-2 text-sm font-black mb-2" placeholder="정답 알려주기..." /><button onClick={() => addQuestionReply(q.id)} className="bg-blue-600 text-white px-4 py-1 text-xs font-black uppercase font-black">답변 달기</button></div></div> ))} </div>
                            </div>
                        )}

                        {view === 'playground' && (
                            <div className="animate-fade text-center px-1">
                                <h2 className="text-4xl md:text-8xl font-title italic mb-6 text-white text-floating uppercase font-black">Playground</h2>
                                <PlaygroundPage />
                            </div>
                        )}
                    </main>

                    <footer className="mt-32 md:mt-80 border-t-4 md:border-t-[12px] border-white pt-10 md:pt-20 pb-20 text-white px-4 text-center">
                        <div className="flex flex-col items-center gap-6">
                            <div className="drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                                <p className="font-title text-3xl md:text-7xl mb-2 font-black">REAL KOREAN STUDIO 2026</p>
                                <p className="font-black uppercase text-[8px] md:text-xs opacity-80 font-black">© 2026 CHRIS . ALL RIGHTS RESERVED</p>
                            </div>
                            <div className="flex items-center gap-8 md:gap-12 mt-4">
                                <a href="https://www.instagram.com/christopher_choi90" target="_blank" rel="noopener noreferrer" className="hover:scale-125 transition-transform drop-shadow-lg">
                                    <svg className="h-10 w-10 md:h-16 md:w-16 fill-white" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.31.975.975 1.247 2.242 1.31 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.063 1.366-.335 2.633-1.31 3.608-.975.975-2.242 1.247-3.608 1.31-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.063-2.633-.335-3.608-1.31-.975-.975-1.247-2.242-1.31-3.608-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.334-2.633 1.31-3.608.975-.975 2.242-1.247 3.608-1.31 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                                </a>
                                <a href="https://www.youtube.com/@굴이수" target="_blank" rel="noopener noreferrer" className="hover:scale-125 transition-transform drop-shadow-lg">
                                    <svg className="h-10 w-10 md:h-20 md:w-20 fill-white" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const PlaygroundPage = () => {
            const [activeGame, setActiveGame] = React.useState(null);
            return (
                <div className="w-full text-black">
                    {!activeGame ? (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div onClick={() => setActiveGame('rain')} className="border-4 border-black p-6 bg-white brutal-shadow cursor-pointer hover:bg-yellow-300 font-black"><h3 className="text-xl md:text-4xl font-title mb-1 font-black">단어 소나기</h3><p className="font-black text-[10px] opacity-40 uppercase font-black">Word Rain</p></div>
                            <div onClick={() => setActiveGame('fishing')} className="border-4 border-black p-6 bg-white brutal-shadow cursor-pointer hover:bg-blue-300 font-black"><h3 className="text-xl md:text-4xl font-title mb-1 font-black">문법 낚시</h3><p className="font-black text-[10px] opacity-40 uppercase font-black">Grammar Fishing</p></div>
                            <div onClick={() => setActiveGame('snake')} className="border-4 border-black p-6 bg-white brutal-shadow cursor-pointer hover:bg-green-300 font-black"><h3 className="text-xl md:text-4xl font-title mb-1 font-black">단어 뱀</h3><p className="font-black text-[10px] opacity-40 uppercase font-black">Word Snake</p></div>
                        </div>
                    ) : (
                        <div className="flex flex-col items-center"><button onClick={() => setActiveGame(null)} className="mb-4 bg-red-600 text-white px-4 py-2 font-black brutal-shadow-sm uppercase text-xs font-black">나가기 EXIT</button><div className="w-full max-w-[500px] h-[450px] border-4 md:border-8 border-black brutal-shadow relative bg-white">{activeGame === 'rain' && <WordRain />}{activeGame === 'fishing' && <GrammarFishing />}{activeGame === 'snake' && <WordSnake />}</div></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('App 등록 성공!', reg))
                    .catch(err => console.log('App 등록 실패ㅠ', err));
            });
        }
        root.render(<App />);
    </script>
</body>
</html>
